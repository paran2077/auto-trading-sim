name: Daily Trading Bot

on:
  schedule:
    - cron: '30 7 * * 1-5'  # 日本時間 16:30（平日のみ）
  workflow_dispatch:          # 手動実行も可能

jobs:
  trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Run trading bot
        run: python trading_bot.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Save database to repo
        run: |
          git config user.email "2003aoi1531@gmail.com"
          git config user.name "paran2077"
          git add trading.db
          git diff --staged --quiet || git commit -m "Daily trade: $(date +'%Y-%m-%d')"
          git push
